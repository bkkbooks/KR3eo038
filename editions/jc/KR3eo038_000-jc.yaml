front:
  text: 序昔神農遍嘗百藥以辨五苦六辛之味逮伊尹而湯液之劑備黃帝欲創九針以治三陰三陽之疾得岐伯而砭艾之法精雖大聖人有意於拯民之瘼必待賢明博通之臣或為之先或為之後然後聖人之所為得行於永久也醫家之務經是二聖二賢而能事畢矣後之留意於方術者苟知藥而不知灸未足以盡治療之體知灸而不知針未足以極表裡之變如能兼是聖賢之縕者其名醫之良乎有唐真人孫思邈者乃其人也以上智之材抱康時之志當太宗治平之際思所以佐迺後庇民之事以謂上醫之道真聖人之政而王官之一守也而乃祖述農黃之旨發明岐摯之學經掇扁鵲之難方採倉公之禁前仲景黃素元化綠袟葛仙翁之必效胡居士之經驗張苗之藥對叔和之脈法皇甫謐之三部陶隱居之百一自余郭玉範汪僧坦阮炳上極文字之初下訖有隋之世或經或方無不採摭集諸家之所秘要去眾說之所未至成書一部總三十卷目錄一通臟腑之論針艾之法脈證之辨食治之宜始婦人而次嬰孺先腳氣而後中風傷寒癰疽消渴水腫七竅之痾五石之毒備急之方養性之術總篇二百三十二門合方論五千三百首莫不十全可驗四種兼包厚德過於千金遺法傳於百代使二聖二賢之美不墜於地而世之人得以階近而至遠上識於三皇之奧者孫真人善述之功也然以俗尚險怪我道純正不述剖腹易心之異世務徑省我書浩博不可道聽塗說而知是以學寡其人寢以紛靡賢不繼世簡編斷缺不知者以異端見黜好之者以闕疑輟功恭惟我朝以好生為德以廣愛為仁乃詔儒臣正是墜學臣等術謝多通職專典校於是請內府之秘書探道藏之別錄公私眾本搜訪幾遍得以正其訛謬補其遺佚文之重複者削之事之不倫者緝之編次類聚朞月功至綱領雖有所立文義猶或疑阻是用端本以正末如素問九墟靈樞甲乙太素巢源諸家本草前古脈書金匱玉函肘後備急謝士秦刪繁方劉涓子鬼遺論之類事關所出無不研核尚有所闕而又溯流以討源如五鑑經千金翼崔氏纂要延年秘錄正元廣利外臺秘要兵部手集夢得傳信之類凡所派別無不考理互相質正反覆稽參然後遺文疑義煥然悉明書雖是舊用之惟新可以濟函靈裨乃聖好生之治可以傳不朽副主上廣愛之心非徒為太平之文致寔可佐皇極之錫福校讎既成繕寫伊始恭以上進庶備親覽太子右贊善大夫臣高保衡尚書都官員外郎臣孫奇尚書司封郎中充秘閣校理臣林億等謹上序論第一仲景曰人體平和惟須好將養勿妄服藥藥勢偏有所助令人臟氣不平易受外患夫含氣之類未有不資食以存生而不知食之有成敗百姓日用而不知水火至近而難識余慨其如此聊因筆墨之暇撰五味損益食治篇以啟童稚庶勤而行之有如影響耳河東衛汛記曰扁鵲云人之所依者形也亂於和氣者病也理於煩毒者藥也濟命扶危者醫也安身之本必資於食救疾之速必憑於藥不知食宜者不足以存生也不明藥忌者不能以除病也斯之二事有靈之所要也若忽而不學誠可悲夫是故食能排邪而安臟腑悅神爽志以資血氣若能用食平痾釋情遣疾者可謂良工長年餌老之奇法極養生之術也夫為醫者當須先洞曉病源知其所犯以食治之食療不愈然後命藥藥性剛烈猶若御兵兵之猛暴豈容妄發發用乖宜損傷處眾藥之投疾殃濫亦然高平王熙稱食不欲雜雜則或有所犯有所犯者或有所傷或當時雖無災苦積久為人作患又食啖鮭餚務令簡少魚肉果實取益人者而食之凡常飲食每令節儉若貪味多餐臨盤大飽食訖覺腹中彭亨短氣或致暴疾仍為霍亂又夏至以後迄至秋分必須慎肥膩餅臛酥油之屬此物與酒漿瓜果理極相仿夫在身所以多疾者皆由春夏取冷太過飲食不節故也又魚鱠諸腥冷之物多損於人斷之益善乳酪酥等常食之令人有筋力膽干肌體潤澤卒多食之亦令臚脹泄利漸漸自已黃帝曰五味入於口也各有所走各有所病酸走筋多食酸令人癃不知何以然少俞曰酸入胃也其氣澀以收也上走兩焦兩焦之氣澀不能出入不出即流於胃中胃中和溫即下注膀胱膀胱走胞胞薄以耎得酸則縮卷約而不通水道不利故癃也陰者積筋之所終聚也故酸入胃走於筋也咸走血多食鹹令人渴何也答曰鹹入胃也其氣走中焦注於諸脈脈者血之所走也與咸相得即血凝凝則胃中汁泣汁泣則胃中乾渴渴則咽路焦焦故舌乾喜渴血脈者中焦之道也故鹹入胃走於血辛走氣多食辛令人慍心何也答曰辛入胃也其氣走於上焦上焦者受使諸氣而營諸陽者也薑韭之氣重至榮衛榮衛不時受之卻溜於心下故慍慍痛也辛者與氣俱行故辛入胃而走氣與氣俱出故氣盛也苦走骨多食苦令人變嘔何也答曰苦入胃也其氣燥而湧泄五穀之氣皆不勝苦苦入下管下管者三焦之道皆閉則不通不通故氣變嘔也齒者骨之所終也故苦入胃而走骨入而復出齒必黧疏甘走肉多食甘令人噁心何也答曰甘入胃也其氣弱劣不能上進於上焦而與谷俱留於胃中甘入則柔緩柔緩則蛔動蛔動則令人噁心其氣外通於肉故甘走肉則肉多粟起而胝黃帝問曰谷之五味所主可得聞乎伯高對曰夫食風者則有靈而輕舉食氣者則和靜而延壽食谷者則有智而勞神食草者則愚癡而多力食肉者則勇猛而多嗔是以肝木青色宜酸心火赤色宜苦脾土黃色宜甘肺金白色宜辛腎水黑色宜咸內為五臟外主五行色配五方五臟所合法肝合筋其榮爪心合脈其榮色脾合肉其榮唇肺合皮其榮毛腎合骨其榮發五臟不可食忌法多食酸則皮槁而毛夭多食苦則筋急而爪枯多食甘則骨痛而發落多食辛則肉胝而唇褰多食鹹則脈凝泣而色變五臟所宜食法肝病宜食麻犬肉李韭心病宜食麥羊肉杏薤脾病宜食稗米牛肉棗葵肺病宜食黃黍雞肉桃蔥腎病宜食大豆黃卷豕肉慄藿五味動病法酸走筋筋病勿食酸苦走骨骨病勿食苦甘走肉肉病勿食甘辛走氣氣病勿食辛咸走血血病勿食鹹五味所配法米飯甘麻酸大豆咸麥苦黃黍辛棗甘李酸慄咸杏苦桃辛牛甘犬酸豕咸羊苦雞辛葵甘韭酸藿咸薤苦蔥辛五臟病五味對治法肝苦急急食甘以緩之肝欲散急食辛以散之用酸瀉之禁當風心苦緩急食酸以收之心欲耎急食鹹以耎之用甘瀉之禁溫食厚衣脾苦濕急食苦以燥之脾欲緩急食甘以緩之用苦瀉之禁溫食飽食濕地濡衣肺苦氣上逆息者急食苦以泄之肺欲收急食酸以收之用辛瀉之禁無寒飲食寒衣腎苦燥急食辛以潤之開腠理潤致津液通氣也腎欲堅急食苦以結之用鹹瀉之無犯焠㶼無熱衣溫食是以毒藥攻邪五穀為養五肉為益五果為助五菜為充精以食氣氣養精以榮色形以食味味養形以生力此之謂也神臟有五五五二十五種形臟有四方四時四季四肢共為五九四十五以此輔神可長生久視也精順五氣以為靈也若食氣相惡則傷精也形受味以成也若食味不調則損形也是以聖人先用食禁以存性後製藥以防命也故形不足者溫之以氣精不足者補之以味氣味溫補以存形精岐伯云陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅味厚者為陰味薄者為陰之陽氣厚者為陽氣薄者為陽之陰味厚則泄薄則通流氣薄則發泄厚則秘塞壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣味辛甘發散為陽酸苦湧泄為陰陰勝則陽病陽勝則陰病陰陽調和人則平安春七十二日省酸增甘以養脾氣夏七十二日省苦增辛以養肺氣秋七十二日省辛增酸以養肝氣冬七十二日省咸增苦以養心氣季月各十八日省甘增咸以養腎氣
