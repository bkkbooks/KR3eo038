body:
  text: 果實第二二十九條檳榔味辛溫澀無毒消穀逐水除淡澼殺三蟲去伏屍治寸白豆蔻味辛溫澀無毒溫中主心腹痛止吐嘔去口氣臭蒲桃味甘辛平無毒主筋骨濕痹益氣倍力強志令人肥健耐飢忍風寒久食輕身不老延年治腸間水調中可作酒常飲益人逐水利小便覆盆子味甘辛平無毒益氣輕身令發不白大棗味甘辛熱滑無毒主心腹邪氣安中養脾氣助十二經平胃氣通九竅補少氣少津液身中不足大驚四肢重可和百藥補中益氣強志除煩悶心下懸治腸澼久服輕身長年不飢神仙生棗味甘辛多食令人熱渴氣脹若寒熱羸瘦者彌不可食傷人藕實味苦甘寒無毒食之令人心歡止渴去熱補中養神益氣力除百病久服輕身耐老不飢延年一名水芝生根寒止熱渴破留血雞頭實味甘平無毒主濕痹腰脊膝痛補中除暴疾益精氣強志意耳目聰明久服輕身不飢耐老神仙芰實味甘辛平無毒安中補五臟不飢輕身一名菱黃帝云七月勿食生菱芰作蟯蟲栗子味鹹溫無毒益氣厚腸胃補腎氣令人耐飢生食之甚治腰腳不遂櫻桃味甘平澀調中益氣可多食令人好顏色美志性橘柚味辛溫無毒主胸中瘕滿逆氣利水穀下氣止嘔咳除膀胱留熱停水破五淋利小便治脾不能消穀卻胸中吐逆霍亂止瀉利去寸白久服去口臭下氣通神輕身長年一名橘皮陳久者良津符子味苦平滑多食令人口爽不知五味梅實味酸平澀無毒下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黑志惡疾止下利好唾口乾利筋脈多食壞人齒柿味甘寒澀無毒通鼻耳氣主腸澼不足及火瘡金瘡止痛木瓜實味酸咸溫澀無毒主濕痹氣霍亂大吐下後腳轉筋不止其生樹皮無毒亦可煮用榧實味甘平澀無毒主五痔去三蟲殺蠱毒鬼疰惡毒甘蔗味甘平澀無毒下氣和中補脾氣利大腸止渴去煩解酒毒耎棗味苦冷澀無毒多食動宿病益冷氣發咳嗽芋味辛平滑有毒寬腸胃充肌膚滑中一名土芝不可多食動宿冷烏芋味苦甘微寒滑無毒主消渴癉熱益氣一名藉姑一名水萍三月採杏核人味甘苦溫冷而利有毒主咳逆上氣腸中雷鳴喉痹下氣產乳金瘡寒心奔㹠驚癇心下煩熱風氣去來時行頭痛解肌消心下急殺狗毒五月採之其一核兩人者害人宜去之杏實尚生味極酸其中核猶未硬者採之暴乾食之甚止渴去冷熱毒扁鵲云杏人不可久服令人目盲眉發落動一切宿病桃核人味苦甘辛平無毒破瘀血血閉癥瘕邪氣殺小蟲治咳逆上氣消心下硬除卒暴聲血破癥瘕通月水止心痛七月採凡一切果核中有兩人者並害人不在用其實味酸無毒多食令人有熱黃帝云飽食桃入水浴成淋病李核人味苦平無毒主僵仆躋瘀血骨痛實味苦酸微溫澀無毒除固熱調中宜心不可多食令人虛黃帝云李子不可和白蜜食蝕人五內梨味甘微酸寒澀有毒除客熱氣止心煩不可多食令人寒中金瘡產婦勿食令人萎困寒中林檎味酸苦平澀無毒止渴好唾不可多食令人百脈弱柰子味酸苦寒澀無毒耐飢益心氣不可多食令人臚脹久病人食之病尤甚安石榴味甘酸澀無毒止咽燥渴不可多食損人肺枇杷葉味苦平無毒主啘不止下氣正爾削取生樹皮嚼之少少咽汁亦可煮汁冷服之大佳胡桃味甘冷滑無毒不可多食動痰飲令人噁心吐水吐食菜蔬第三五十八條枸杞葉味苦平澀無毒補虛羸益精髓諺云去家千里勿食蘿摩枸杞此則言強陽道資陰氣速疾也蘿摩味甘平一名苦丸無毒其葉厚大作藤生摘之有白汁出人家多種亦可生啖亦可蒸煮食之補益與枸杞葉同瓜子味甘平寒無毒令人光澤好顏色益氣不飢久服輕身耐老又除胸滿心不樂久食寒中可作面脂一名水芝一名白瓜子即冬瓜人也八月採白冬瓜味甘微寒無毒除少腹水脹利小便止消渴凡瓜味甘寒滑無毒去渴多食令陰下癢濕生瘡發黃疸黃帝云九月勿食被霜瓜向冬發寒熱及溫病初食時即令人慾吐也食竟心內作停水不能自消或為反胃凡瓜入水沉者食之得冷病終身不瘥越瓜味甘平無毒不可多食益腸胃胡瓜味甘寒有毒不可多食動寒熱多瘧病積瘀血熱早青瓜味甘寒無毒食之去熱煩不可久食令人多忘冬葵子味甘寒無毒主五臟六腑寒熱羸瘦破五淋利小便婦人乳難血閉久服堅骨長肌肉輕身延年十二月採葉甘寒滑無毒宜脾久食利胃氣其心傷人百藥忌食心心有毒黃帝云霜葵陳者生食之動五種流飲飲盛則吐水凡葵菜和鯉魚鮓食之害人四季之月土王時勿食生葵菜令人飲食不化發宿病莧菜實味甘寒澀無毒主青盲白瞖明目除邪氣利大小便去寒熱殺蛔蟲久服益氣力不飢輕身一名馬莧一名莫實即馬齒莧菜也治反花瘡小莧菜味甘大寒滑無毒可久食益氣力除熱不可共鱉肉食成鱉瘕蕨菜亦成鱉瘕邪蒿味辛溫澀無毒主胸膈中臭惡氣利腸胃苦菜味苦大寒滑無毒主五臟邪氣厭谷胃癉腸澼大渴熱中暴疾惡瘡久食安心益氣聰察少臥輕身耐老耐飢寒一名荼草一名選一名遊冬冬不死四月上旬採薺菜味甘溫澀無毒利肝氣和中殺諸毒其子主明目目痛淚出其根主目澀痛蕪菁及蘆菔菜味苦冷澀無毒利五臟輕身益氣宜久食蕪菁子明目九蒸暴療黃疸利小便久服神仙根主消風熱毒腫不可多食令人氣脹菘菜味甘溫澀無毒久食通利腸胃除胸中煩解消渴本是蔓菁也種之江南即化為菘亦如枳橘所生土地隨變芥菜味辛溫無毒歸鼻除腎邪大破咳逆下氣利九竅明耳目安中久食溫中又云寒中其子味辛辛亦歸鼻有毒主喉痹去一切風毒腫黃帝云芥菜不可共兔肉食成惡邪病苜蓿味苦平澀無毒安中利人四體可久食荏子味辛溫無毒主咳逆下氣溫中補髓其葉主調中去臭氣九月採陰乾用之油亦可作油衣蓼實味辛溫無毒明目溫中解肌耐風寒下水氣面目浮腫卻癰疽其葉辛歸舌治大小腸邪氣利中益志黃帝云蓼食過多有毒發心痛和生魚食之令人脫氣陰核疼痛求死婦人月事來不用食蓼及蒜喜為血淋帶下二月勿食蓼傷人腎扁鵲云蓼久食令人寒熱損骨髓殺丈夫陰氣少精蔥實味辛溫無毒宜肺辛歸頭明目補中不足其莖白平滑可作湯主傷寒寒熱骨肉碎痛能出汗治中風面目浮腫喉痹不通安胎殺桂其青葉溫辛歸目除肝中邪氣安中利五臟益目精發黃疸殺百藥毒其根鬚平主傷寒頭痛蔥中涕及生蔥汁平滑止尿血解藜蘆及桂毒黃帝云食生蔥即啖蜜變作下利食燒蔥並啖蜜擁氣而死正月不得食生蔥令人面上起遊風格蔥味辛微溫無毒除瘴氣惡毒久食益膽氣強志其子主泄精薤味苦辛溫滑無毒宜心辛歸骨主金瘡瘡敗能生肌肉輕身不飢耐老菜芝也除寒熱去水氣溫中散結氣利產婦病人諸瘡中風寒水腫生搗敷之飠更骨在咽不下者食之則去黃帝云薤不可共牛肉作羹食之成瘕疾韭亦然十月十一月十二月勿食生薤令人多涕唾韭味辛酸溫澀無毒辛歸心宜肝可久食安五臟除胃中熱不利病人其心腹有固冷者食之必加劇其子主夢泄精尿色白根煮汁以養髮黃帝云霜韭凍不可生食動宿飲飲盛必吐水五月勿食韭損人滋味令人乏氣力二月三月宜食韭大益人心白蘘荷味辛微溫澀無毒主中蠱及瘧病搗汁服二合日二生根主諸瘡菾菜味甘苦大寒無毒主時行壯熱解風熱惡毒紫蘇味辛微溫無毒下氣除寒中其子尤善雞蘇味辛微溫澀無毒主吐血下氣一名水蘇羅勒味苦辛溫平澀無毒消停水散毒氣不可久食澀榮衛諸氣蕪荑味辛平熱滑無毒主五內邪氣散皮膚骨節中淫淫溫行毒去三蟲能化宿食不消逐寸白散腹中溫溫喘息一名無姑一名𦽄蓎盛器物中甚闢水蛭其氣甚臭此即山榆子作之凡榆葉味甘平滑無毒主小兒癇小便不利傷暑熱困悶煮汁冷服生榆白皮味甘冷無毒利小便破五淋花主小兒頭瘡胡荽子味酸平無毒消穀能復食味葉不可久食令人多忘華佗云胡荽菜患胡臭人患口氣臭䘌齒人食之加劇腹內患邪氣者彌不得食食之發宿病金瘡尤忌海藻咸寒滑無毒主癭瘤結氣散頸下鞭核痛者腸內上下雷鳴下十二水腫利小便起男子陰氣昆布味鹹寒滑無毒下十二水腫癭瘤結氣瘻瘡破積聚茼蒿味辛平無毒安心氣養脾胃消痰飲白蒿味苦辛平無毒養五臟補中益氣長毛髮久食不死白兔食之仙吳葵一名蜀葵味甘微寒滑無毒花定心氣葉除客熱利腸胃不可久食鈍人志性若食之被狗齧者瘡永不瘥藿味鹹寒澀無毒宜腎主大小便數去煩熱香薷味辛微溫主霍亂腹痛吐下散水腫煩心去熱甜瓠味甘平滑無毒主消渴惡瘡鼻口中肉爛痛其葉味甘平主耐飢扁鵲云患腳氣虛脹者不得食之其患永不除蓴味甘寒滑無毒主消渴熱痹多食動痔病落葵味酸寒無毒滑中散熱實悅澤人面一名天葵一名蘩露蘩蔞味酸平無毒主積年惡瘡痔不愈者五月五日日中採之即名滋草一名雞腸草干之燒作焦灰用扁鵲云丈夫患惡瘡陰頭及莖作瘡膿爛疼痛不可堪忍久不瘥者以灰一分蚯蚓新出屎泥二分以少水和研緩如煎餅面以泥瘡上干則易之禁酒面五辛並熱食等黃帝云蘩蔞合䱇鮓食之發消渴病令人多忘別有一種近水渠中溫濕處冬生其狀類胡荽亦名雞腸菜可以療痔病一名天胡荽蕺味辛微溫有小毒主蠼螋尿瘡多食令人氣喘不利人腳多食腳痛葫味辛溫有毒辛歸五臟散癱疽治䘌瘡除風邪殺蠱毒氣獨子者最良黃帝云生葫合青魚鮓食之令人腹內生瘡腸中腫又成疝瘕多食生葫行房傷肝氣令人面無色四月八月勿食葫傷人神損膽氣令人喘悸脅肋氣急口味多爽小蒜味辛溫無毒辛歸脾腎主霍亂腹中不安消穀理胃氣溫中除邪痹毒氣五月五日採曝乾葉主心煩痛解諸毒小兒丹𤺋不可久食損人心力黃帝云食小蒜啖生魚令人奪氣陰核疼求死三月勿食小蒜傷人志性茗葉味苦鹹酸冷無毒可久食令人有力悅志微動氣黃帝云不可共韭食令人身重蕃荷葉味苦辛溫無毒可久食卻腎氣令人口氣香絜主辟邪毒除勞弊形瘦疲倦者不可久食動消渴病蒼耳子味苦甘溫葉味苦辛微寒澀有小毒主風寒頭痛風濕痹四肢拘急攣痛去惡肉死肌膝痛溪毒久服益氣耳目聰明強志輕身一名胡葈一名地葵一名葹一名常思蜀人名羊負來秦名蒼耳魏人名只刺黃帝云戴甲蒼耳不可共豬肉食害人食甜粥復以蒼耳甲下之成走注又患兩脅立秋後忌食之食茱萸味辛苦大溫無毒九月採停陳久者良其子閉口者有毒不任用止痛下氣除咳逆去五臟中寒冷溫中諸冷實不消其生白皮主中惡腹痛止齒疼其根細者去三蟲寸白黃帝云六月七月勿食茱萸傷神氣令人起伏氣咽喉不通徹賊風中人口僻不能語者取茱萸一升去黑子及合口者好豉三升二物以清酒和煮四五沸取汁冷服半升日三得小汗瘥蠆螫人嚼茱萸封上止蜀椒味辛大熱有毒主邪氣溫中下氣留飲宿食能使痛者癢癢者痛久食令人乏氣失明主咳逆逐皮膚中寒冷去死肌濕痹痛心下冷氣除五臟六腑寒百骨節中積冷溫瘧大風汗自出者止下利散風邪合口者害人其中黑子有小毒下水仲景云熬用之黃帝云十月勿食椒損人心傷血脈乾薑味辛熱無毒主胸中滿咳逆上氣溫中止漏血出汗逐風濕痹腸澼下利寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血生者尤良生薑味辛微溫無毒辛歸五臟主傷寒頭痛去淡下氣通汗除鼻中塞咳逆上氣止嘔吐去胸膈上臭氣通神明黃帝云八月九月匆食姜傷人神損壽胡居士云姜殺腹內長蟲久服令人少志少智傷心性堇葵味苦平無毒久服除人心煩急動痰冷身重多懈惰芸臺味辛寒無毒主腰腳痹若舊患腰腳痛者不可食必加劇又治油腫丹毒益胡臭解禁呪之輩出五明經其子主夢中泄精與鬼交者胡居士云世人呼為寒菜甚辣胡臭人食之病加劇隴西氐羌中多種食之竹筍味甘微寒無毒主消渴利水道益氣力可久食患冷人食之心痛野苣味苦平無毒久服輕身少睡黃帝云不可共蜜食之作痔白苣味苦平無毒益筋力黃帝云不可共酪食必作蟲茴香菜味苦辛微寒澀無毒主霍亂闢熱除口氣臭肉和水煮下少許即無臭氣故曰茴香醬臭末中亦香其子主蛇咬瘡久不瘥搗傅之又治九種瘻蕈菜味苦寒無毒主小兒火丹諸毒腫去暴熱藍菜味甘平無毒久食大益腎填髓腦利五臟調六腑胡居士云河東隴西羌胡多種食之漢地鮮有其葉長大厚煮食甘美經冬不死春亦有英其花黃生角結子子甚治人多睡萹竹葉味苦平澀無毒主浸淫疥瘙疽痔殺三蟲女人陰蝕扁鵲云煮汁與小兒冷服治蛔蟲芹菜味苦酸冷澀無毒益筋力去伏熱治五種黃病生搗絞汁冷服一升日二黃帝云五月五日勿食一切菜發百病凡一切菜熟煮熱食時病瘥後食一切肉並蒜食竟行房病發必死時病瘥後未健食生青菜者手足必青腫時病瘥未健食青菜竟行房病更發必死十月勿食被霜菜令人面上無光澤目澀痛又瘧發心痛腰疼或致心瘧發時手足十指爪皆青困痿穀米第四二十七條薏苡人味甘溫無毒主筋拘攣不可屈伸久風濕痹下氣久服輕身益力其生根下三蟲名醫云薏苡人除筋骨中邪氣不仁利腸胃消水腫令人能食一名𧆐一名感米蜀人多種食之胡麻味甘平無毒主傷中虛羸補五內益氣力長肌肉填髓腦堅筋骨療金瘡止痛及傷寒溫瘧大吐下後虛熱困乏久服輕身不老明耳目耐寒暑延年作油微寒主利大腸產婦胞衣不落生者摩瘡腫生禿髮去頭面遊風一名巨勝一名狗蝨一名方莖一名鴻芷葉名青蘘主傷暑熱花主生禿髮七日採最上摽頭者陰乾用之白麻子味甘平無毒宜肝解中益氣肥健不老治中風汗出逐水利小便破積血風毒腫復血脈產後乳余疾能長髮可為沐藥久服神仙𥹋味甘微溫無毒補虛冷益氣力止腸鳴咽痛除唾血卻卒嗽大豆黃卷味甘平無毒主久風濕痹筋攣膝痛除五臟胃氣結積益氣止毒去黑痣面䵟潤澤皮毛宜腎生大豆味甘平冷無毒生搗淳酢和塗之治一切毒腫並止痛煮汁冷服之殺鬼毒逐水脹除胃中熱卻風痹傷中淋露下瘀血散五臟結積內寒殺烏頭三建解百藥毒不可久服令人身重其熬屑味甘溫平無毒主胃中熱去身腫除痹消穀止腹脹九月採黃帝云服大豆屑忌食豬肉炒豆不得與一歲已上十歲已下小兒食食竟啖豬肉必擁氣死赤小豆味甘咸平冷無毒下水腫排膿血一名赤豆不可久服令人枯燥青小豆味甘咸溫平澀無毒主寒熱熱中消渴止泄利利小便除吐逆卒澼下腹脹滿一名麻累一名胡豆黃帝云青小豆合鯉魚鮓食之令人肝至五年成干痟病大豆豉味苦甘寒澀無毒主傷寒頭痛寒熱闢瘴氣惡毒煩躁滿悶虛勞喘吸兩腳疼冷殺六畜胎子諸毒大麥味鹹微寒滑無毒宜心主消渴除熱久食令人多力健行作蘖溫消食和中熬末令赤黑搗作麨止泄利和清酢漿服之日三夜一服小麥味甘微寒無毒養肝氣去客熱止煩渴咽燥利小便止漏血唾血令女人孕必得易作曲六月作者溫無毒主小兒癇食不消下五痔蟲平胃氣消穀止利作面溫無毒不能消熱止煩不可多食長宿癖加客氣難治青粱米味甘微寒無毒主胃痹熱中除消渴止泄利利小便益氣力補中輕身長年黃粱米味甘平無毒益氣和中止泄利人呼為竹根米又卻當風臥濕寒中者白粱米味甘微寒無毒除熱益氣粟米味鹹微寒無毒養腎氣去骨痹熱中益氣陳粟米味苦寒無毒主胃中熱消渴利小便丹黍米味苦微溫無毒主咳逆上氣霍亂止泄利除熱去煩渴白黍米味甘辛溫無毒宜肺補中益氣不可久食多熱令人煩黃帝云五種黍米合葵食之令人成痼疾又以脯臘著五種黍米中藏儲食之云令人閉氣陳廩米味鹹酸微寒無毒除煩熱下氣調胃止泄利黃帝云久芷脯臘安米中滿三月人不知食之害人蘖米味苦微溫無毒主寒中下氣除熱秫米味甘微寒無毒主寒熱利大腸治漆瘡酒味苦甘辛大熱有毒行藥勢殺百邪惡氣黃帝云暴下後飲酒者膈上變為伏熱食生菜飲酒莫灸腹令人腸結扁鵲云久飲酒者腐腸爛胃潰髓蒸筋傷神損壽醉當風臥以扇自扇成惡風醉以冷水洗浴成疼痹大醉汗出當以粉粉身令其自干發成風痹常日未沒食訖即莫飲酒終身不幹嘔飽食訖多飲水及酒成痞僻萹豆味甘微溫無毒和中下氣其葉平主霍亂吐下不止稷米味甘平無毒益氣安中補虛和胃宜脾粳米味辛苦平無毒主心煩斷下利平胃氣長肌肉溫又云生者冷燔者熱糯米味苦溫無毒溫中令人能食多熱大便硬酢味酸溫澀無毒消癰腫散水氣殺邪毒血運扁鵲云多食酢損人骨能理諸藥消毒喬麥味酸微寒無毒食之難消動大熱風其葉生食動刺風令人身癢黃帝云作面和豬羊肉熱食之不過八九頓作熱風令人眉須落又還生仍希少涇邠已北多患此疾鹽味鹹溫無毒殺鬼蠱邪注毒氣下部䘌瘡傷寒寒熱能吐胸中痰澼止心腹卒痛堅肌骨不可多食傷肺喜咳令人色膚黑損筋力扁鵲云鹽能除一切大風疾痛者炒熨之黃帝云食甜粥竟食鹽即吐或成霍亂鳥獸第五四十條附蟲魚人乳汁味甘平無毒補五臟令人肥白悅澤馬乳汁味辛溫無毒止渴牛乳汁味甘微寒無毒補虛羸止渴入生薑蔥白止小兒吐乳補勞羊乳汁味甘微溫無毒補寒冷虛乏少血色令人熱中驢乳味酸寒一云大寒無毒主大熱黃疸止渴母豬乳平無毒主小兒驚癇以飲之神妙馬牛羊酪味甘酸微寒無毒補肺臟利大腸黃帝云食甜酪竟即食大酢者變作血瘕及尿血華佗云馬牛羊酪蚰蜒入耳者灌之即出沙牛及白羊酥味甘微寒無毒除胸中客氣利大小腸治口瘡犛牛酥味甘平無毒去諸風濕痹除熱利大便去宿食醍醐味甘平無毒補虛去諸風痹百練乃佳甚去月蝕瘡添髓補中填骨久服增年熊肉味甘微寒微溫無毒主風痹不仁筋急五緩若腹中有積聚寒熱羸瘦者食熊肉病永不除其脂味甘微寒治法與肉同又去頭瘍白禿面䵟𪒟食飲嘔吐久服強志不飢輕身長年黃帝云一切諸肉煮不熟生不斂者食之成瘕熊及豬二種脂不可作燈其煙氣入人目失明不能遠視羖羊角味酸苦溫微寒無毒主青盲明目殺疥蟲止寒泄心畏驚悸除百節中結氣及風傷蠱毒吐血婦人產後余痛燒之殺鬼魅闢虎狼久服安心益氣輕身勿令中濕有毒髓味甘溫無毒主男子女人傷中陰陽氣不足卻風熱止毒利血脈益經氣以酒和服之亦可久服不損人青羊膽汁冷無毒主諸瘡能生人身脈治青盲明目肺平補肺治嗽止渴多小便傷中止虛補不足去風邪肝補肝明目心主憂恚膈中逆氣腎補腎氣虛弱益精髓頭骨主小兒驚癇煮以浴之蹄肉平主丈夫五勞七傷肉味苦甘大熱無毒主暖中止痛字乳余疾及頭腦中大風汗自出虛勞寒冷能補中益氣力安心止驚利產婦不利時患人頭肉平主風眩瘦疾小兒驚癇丈夫五勞七傷其骨熱主虛勞寒中羸瘦其宿有熱者不可食生脂止下痢脫肛去風毒婦人產後腹中絞痛肚主胃反治虛羸小便數止虛汗黃帝云羊肉共酢食之傷人心亦不可共生魚酪和食之害人凡一切羊蹄甲中有珠子白者名羊懸筋食之令人癲白羊黑頭食其腦作腸癰羊肚共飯飲常食久久成反胃作噎病甜粥共肚食之令人多唾喜吐清水羊腦豬腦男子食之損精氣少子若欲食者研之如粉和醋食之初不如不食佳青羊肝和小豆食之令人目少明一切羊肝生共椒食之破人五臟傷心最損小兒彌忌水中柳木及白楊木不得銅器中煮羖羊肉食之丈夫損陽女子絕陰暴下後不可食羊肉髓及骨汁成煩熱難解還動利凡六畜五臟著草自動搖及得咸酢不變色又墮地不汗又與犬犬不食者皆有毒殺人六月勿食羊肉傷人神氣沙牛髓味甘溫無毒安五臟平胃氣通十二經脈理三焦約溫骨髓補中續絕傷益氣力止泄利去消渴皆以清酒和暖服之肝明目膽可丸百藥味苦大寒無毒除心腹熱渴止下利去口焦燥益目精心主虛忘腎去濕痹補腎氣益精齒主小兒牛癇肉味甘平無毒主消渴止唾涎出安中益氣力養脾胃氣不可常食發宿病自死者不任食喉嚨主小兒啤黃犍沙牛黑牯牛尿味苦辛微溫平無毒主水腫腹腳俱滿者利小便黃帝云烏牛自死北首者食其肉害人一切牛盛熱時卒死者總不堪食食之作腸癰患甲蹄牛食其蹄中拒筋令人作肉刺獨肝牛肉食之殺人牛食蛇者獨肝患疥牛馬肉食令人身體癢牛肉共豬肉食之必作寸白蟲直爾黍米白酒生牛肉共食亦作寸白大忌人下利者食自死牛肉必劇一切牛馬乳汁及酪共生魚食之成魚瘕六畜脾人一生莫食十二月勿食牛肉傷人神氣馬心主喜忘肺主寒熱莖痿肉味辛苦平冷無毒主傷中除熱下氣長筋強腰脊壯健強志利意輕身不飢黃帝云白馬自死食其肉害人白馬玄頭食其腦令人癲白馬鞍下烏色徹肉裡者食之傷人五臟下利者食馬肉必加劇白馬青蹄肉不可食一切馬汗氣及毛不可入食中害人諸食馬肉心煩悶者飲以美酒則解白酒則劇五月勿食馬肉傷人神氣野馬陰莖味酸咸溫無毒主男子陰痿縮少精肉辛平無毒主人馬癇筋脈不能自收周痹肌不仁病死者不任用驢肉味酸平無毒主風狂愁憂不樂能安心氣病死者不任用其頭燒卻毛煮取汁以浸曲釀酒甚治大風動搖不休者皮膠亦治大風狗陰莖味酸平無毒主傷中丈夫陰痿不起狗腦主頭風痹下部䘌瘡鼻中瘜肉肉味酸咸溫無毒宜腎安五臟補絕傷勞損久病大虛者服之輕身益氣力黃帝云白犬合海鮋食之必得惡病白犬自死不出舌者食之害人犬春月多狂若鼻赤起而燥者此欲狂其肉不任食九月勿食犬肉傷人神氣㹠卵味甘溫無毒除陰莖中痛驚癇鬼氣蠱毒除寒熱賁豚五癃邪氣攣縮一名㹠顛陰乾勿令敗㹠肉味辛平有小毒不可久食令人遍體筋肉碎痛乏氣大豬後腳懸蹄甲無毒主五痔伏熱在腹中腸癰內蝕取酒浸半日灸焦用之大豬四蹄小寒無毒主傷撻諸敗瘡母豬蹄寒無毒煮汁服之下乳汁甚解石藥毒大豬頭肉平無毒補虛乏氣力去驚癇鬼毒寒熱五癃腦主風眩心平無毒主驚邪憂恚虛悸氣逆婦人產後中風聚血氣驚恐腎平無毒除冷利理腎氣通膀胱肝味苦平無毒主明目豬喙微寒無毒主凍瘡痛癢肚微寒無毒補中益氣止渴斷暴利虛弱腸微寒無毒主消渴小便數補下焦虛竭其肉間脂肪平無毒主煎諸膏藥破冷結散宿血解斑蝥元青毒豬洞腸平無毒主洞腸挺出血多者猳豬肉味苦酸冷無毒主狂病多日不愈凡豬肉味苦微寒宜腎有小毒補腎氣虛竭不可久食令人少子精發宿病弱筋骨閉血脈虛人肌有金瘡者食之瘡尤甚豬血平澀無毒主卒下血不止美清酒和炒服之又主中風絕傷頭中風眩及諸淋露賁肫暴氣黃帝云凡豬肝肺共魚鱠食之作癰疽豬肝共鯉魚腸魚子食之傷人神㹠腦損男子陽道臨房不能行事八月勿食豬肺及𥹋和食之至冬發疽十月勿食豬肉損人神氣鹿頭肉平主消渴多夢妄見者生血治癰腫莖筋主勞損蹄肉平主腳膝骨中疼痛不能踐地骨主內虛續絕傷補骨可作酒髓味甘溫主丈夫婦人傷中脈絕筋急痛咳逆以酒和服腎平主補腎氣肉味苦溫無毒補中強五臟益氣力肉生者主中風口僻不正細細銼之以薄僻上華佗云和生椒搗薄之使人專看之正則急去之不爾復牽向不僻處角錯取屑一升白蜜五升溲之微火熬令小變色暴乾更搗篩服方寸匕日三令人輕身益氣力強骨髓補絕傷黃帝云鹿膽白者食其肉害人白鹿肉不可和蒲白作羹食發惡瘡五月勿食鹿肉傷人神氣胡居士云鹿性驚烈多別良草怕食九物余者不嘗群處必依山崗產歸下澤饗神用其肉者以其性烈清淨故也凡餌藥之人不可食鹿肉服藥必不得力所以然者以鹿常食解毒之草是故能製毒散諸藥故也九草者葛葉花鹿蔥鹿藥白蒿水芹甘草齊頭蒿山瘡耳薺苨獐骨微溫無毒主虛損泄精肉味甘溫無毒補益五臟髓益氣力悅澤人面獐無膽所以怯弱多驚恐黃帝云五月勿食獐肉傷人神氣麋脂味辛溫無毒主癰腫惡瘡死肌寒熱風寒濕痹四肢拘緩不收風頭腫氣通腠理柔皮膚不可近男子陰令痿一名宮脂十月取黃帝云生麑肉共蝦汁合食之令人心痛生麑肉共雉肉食之作固疾虎肉味酸無毒主噁心欲嘔益氣力止多唾不可熱食壞人齒虎頭骨治風邪虎眼睛主驚癇豹肉味酸溫無毒宜腎安五臟補絕傷輕身益氣久食利人貍肉溫無毒補中輕身益氣亦治諸注黃帝云正月勿食虎豹貍肉傷人神損壽兔肝主目喑肉味辛平澀無毒補中益氣止渴兔無脾所以能走蓋以屬二月建卯木位也木剋土故無脾焉馬無脾亦能走也黃帝云兔肉和獺肝食之三日必成遁屍共白雞肝心食之令人面失色一年成癉黃共姜食變成霍亂共白雞肉食之令人血氣不行二月勿食兔肉傷人神氣生鼠微溫無毒主踒折續筋補骨搗薄之三日一易獺肝味甘有小毒主鬼疰蠱毒卻魚鯁止久嗽皆燒作灰酒和服之獺肉味甘溫無毒主時病疫氣牛馬時行病皆煮取汁停冷服之六畜灌之狐陰莖味甘平有小毒主女子絕產陰中癢小兒陰㿗卵腫肉並五臟及腸肚味苦微寒有毒主蠱毒寒熱五臟固冷小兒驚癇大人狂病見鬼黃帝云麝肉共鵠肉食之作癥瘕野豬青蹄不可食及獸赤足者不可食野獸自死北首伏地不可食獸有歧尾不可食家獸自死共鱠汁食之作疽瘡十一月勿食經夏臭脯成水病作頭眩丈夫陰痿甲子日勿食一切獸肉大吉鳥飛投人不肯去者口中必有物開看無者拔一毛放之大吉一切禽獸自死無傷處不可食三月三日勿食鳥獸五臟及一切果菜五辛等物大吉丹雄雞肉味甘微溫無毒主女人崩中漏下赤白沃補虛溫中能愈久傷乏瘡不肯瘥者通神殺惡毒黃雌雞肉味酸咸平無毒主傷中消渴小便數而不禁腸澼泄利補益五臟絕傷五勞益氣力雞子黃微寒主除熱火灼爛瘡痓可作琥魄神物卵白汁微寒主目熱赤痛除心下伏熱止煩滿咳逆小兒泄利婦人產難胞衣不出生吞之白雄雞肉味酸微溫無毒下氣去狂邪安五臟傷中消渴烏雄雞肉味甘溫無毒補中止心痛黑雌雞肉味甘平無毒除風寒濕痹五緩六急安胎黃帝云一切雞肉和魚肉汁食之成心瘕雞具五色者食其肉必狂若有六指四距玄雞白頭家雞及野雞鳥生子有文八字雞及野鳥死不伸足爪此種食之害人雞子白共蒜食之令人短氣雞子共鱉肉蒸食之害人雞肉獺肉共食作遁屍注藥所不能治食雞子啖生蔥變成短氣雞肉犬肝腎共食害人生蔥共雞犬肉食令人穀道終身流血烏雞肉合鯉魚肉食生癰疽雞兔犬肉和食必泄利野雞肉共家雞子食之成遁屍屍鬼纏身四肢百節疼痛小兒五歲已下飲乳未斷者勿食雞肉二月勿食雞子令人常噁心丙午日食雞雉肉丈夫燒死目盲女人血死妄見四月勿食暴雞肉作內疽在胸腋下出漏孔丈夫少陽女人絕孕虛勞乏氣八月勿食雞肉傷人神氣雉肉酸微寒無毒補中益氣止泄利久食之令人瘦觜主蟻瘻黃帝云八月建酉日食雉肉令人短氣八月勿食雉肉損人神氣白鵝脂主耳卒聾消以灌耳毛主射工水毒肉味辛平利五臟鶩肪味甘平無毒主風虛寒熱肉補虛乏除客熱利臟腑利水道黃帝云六月勿食鶩肉傷人神氣鴛鴦肉味苦微溫無毒主瘻瘡清酒浸之炙令熱以薄之亦炙服之又治夢思慕者雁肪味甘平無毒主風攣拘急偏枯血氣不通利肉味甘平無毒久服長髮鬢須眉益氣不飢輕身耐暑黃帝云六月勿食雁肉傷人神氣越燕屎味辛平有毒主殺蠱毒鬼注逐不祥邪氣破五癃利小便熬香用之治口瘡肉不可食之入水為蛟龍所殺黃帝云十一月勿食鼠肉燕肉損人神氣石蜜味甘平微寒無毒主心腹邪氣驚癇痙安五臟治諸不足益氣補中止腹痛解諸藥毒除眾病和百藥養脾氣消心煩食飲不下止腸澼去肌中疼痛治口瘡明耳目久服強志輕身不飢耐老延年神仙一名石飴白如膏者良是今諸山崖處蜜也青赤蜜味酸噞食之令人心煩其蜂黑色似虻黃帝云七月勿食生蜜令人暴下發霍亂蜜蠟味甘微溫無毒主下利膿血補中續絕傷除金瘡益氣力不飢耐老白蠟主久泄澼瘥後重見血者補絕傷利小兒久服輕身不飢生於蜜房或木石上惡芫花百合此即今所用蠟也蝮蛇肉平有毒釀酒去癩疾諸九瘻心腹痛下結氣除蠱痛其腹中吞鼠平有小毒主鼠瘻原蠶雄蛾味鹹溫有小毒主益精氣強男子陽道交接不倦甚治泄精不用相連者鮧魚味甘無毒主百病鰻鱺魚味甘大溫有毒主五痔瘻殺諸蟲䱇魚肉味甘大溫黑者無毒主補中養血治瀋唇五月五日取頭骨平無毒燒服止久利鱓魚平無毒主少氣吸吸足不能立地黃帝云四月勿食蛇肉鱓肉損神害氣烏賊魚骨味鹹微溫無毒主女子漏下赤白經汁血閉陰蝕腫痛寒熱癥瘕無子驚氣入腹腹痛環臍丈夫陰中痛而腫令人有子肉味酸平無毒益氣強志鯉魚肉味甘平無毒主咳逆上氣癉黃止渴黃帝云食桂竟食鯉魚肉害人腹中宿症病者食鯉魚肉害人鯽魚味甘平無毒主一切瘡燒作灰和醬汁傅之日二又去腸癰黃帝云魚白目不可食之魚有角食之發心驚害人魚無腸膽食之三年丈夫陰痿不起婦人絕孕魚身有黑點不可食魚目赤作鱠食成瘕病作鮓食之害人一切魚共菜食之作蛔蟲蟯蟲一切魚尾食之不益人多有勾骨著人咽害人魚有角白背不可食凡魚赤鱗不可食魚無腮不可食魚無全腮食之發癰疽鯆魮魚不益人其尾有毒治齒痛鯸魚有毒不可食之二月庚寅日勿食魚大惡五月五日勿以鯉魚子共豬肝食必不消化成惡病下利者食一切魚必加劇致困難治穢飯鯘肉臭魚不可合食之害人三月勿食鮫龍肉及一切魚肉令人飲食不化發宿病傷人神氣失氣恍惚鱉肉味甘平無毒主傷中益氣補不足療腳氣黃帝云五月五日以鱉子共鮑魚子食之作癉黃鱉腹下成五字不可食鱉肉兔肉和芥子醬食之損人鱉三足食之害人鱉肉共莧蕨菜食之作鱉瘕害人蟹殼味酸寒有毒主胸中邪熱宿結痛喎僻面腫散漆燒之致鼠其黃解結散血愈漆瘡養筋益氣黃帝云蟹目相向足斑者食之害人十二月勿食蟹鱉損人神氣又云黽鱉肉共豬肉食之害人秋果菜共黽肉食之令人短氣飲酒食黽肉並菰白菜令人生寒熱六甲日勿食龜鱉之肉害人心神螺蚌共菜食之令人心痛三日一發蝦鱠共豬肉食之令人常噁心多唾損精色蝦無須腹下通烏色者食之害人大忌勿輕十一月十二月勿食蝦蚌著甲之物
